<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开卷纪</title>
    <link rel="dns-prefetch" href="https://jsbppxnrnzsxoqfworjj.supabase.co" />
    <link rel="preconnect" href="https://jsbppxnrnzsxoqfworjj.supabase.co" crossorigin />
    <link rel="stylesheet" href="./styles.css?v=20250613-1" />
    <link rel="modulepreload" href="./app.js?v=20250613-1" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">My Library</p>
          <h1>开卷纪</h1>
          <p class="hero-text">开卷有益，故记于此</p>
        </div>
      </section>

      <section class="panel stats-section" aria-labelledby="statsHeading">
        <div class="stats-header">
          <div>
            <h2 id="statsHeading">阅读时长</h2>
            <p class="stats-synced" id="statsSyncedAt">正在加载</p>
          </div>
          <div class="stats-tabs" role="tablist" aria-label="统计周期">
            <button type="button" class="stats-tab is-active" data-mode="weekly" role="tab" aria-selected="true">
              本周
            </button>
            <button type="button" class="stats-tab" data-mode="monthly" role="tab" aria-selected="false">
              本月
            </button>
            <button type="button" class="stats-tab" data-mode="annually" role="tab" aria-selected="false">
              今年
            </button>
          </div>
        </div>

        <div class="stats-empty" id="statsEmptyState">
          <p>正在加载</p>
        </div>

        <div class="stats-body" id="statsBody" hidden>
          <div class="stats-cards">
            <article class="stats-card">
              <p class="stats-card-label">总阅读时长</p>
              <p class="stats-card-value" id="statsTotalTime">—</p>
            </article>
            <article class="stats-card">
              <p class="stats-card-label">阅读天数</p>
              <p class="stats-card-value" id="statsReadDays">—</p>
            </article>
            <article class="stats-card">
              <p class="stats-card-label">自然日均</p>
              <p class="stats-card-value" id="statsDayAverage">—</p>
              <p class="stats-card-note" id="statsCompare" hidden></p>
            </article>
          </div>

          <section class="stats-chart" id="statsDailyChartSection" hidden>
            <p class="stats-chart-heading">阅读分布</p>
            <div
              class="stats-chart-bars"
              id="statsDailyChartBars"
              role="img"
              aria-label="阅读时长分布"
            ></div>
            <div class="stats-chart-tooltip" id="statsChartTooltip" role="tooltip" hidden></div>
          </section>
        </div>
      </section>

      <section class="panel book-section weread-section" aria-labelledby="shelfHeading">
        <div class="stats-header shelf-header">
          <div>
            <h2 id="shelfHeading">阅读记录</h2>
          </div>
          <div class="shelf-search">
            <input
              id="wereadSearchInput"
              type="search"
              placeholder="搜索书名、作者或划线"
            />
          </div>
        </div>

        <div class="shelf-tabs-row">
          <div class="shelf-tabs" role="tablist" aria-label="书架分类">
            <button
              type="button"
              class="shelf-tab is-active"
              data-shelf="reading"
              role="tab"
              aria-selected="true"
            >
              在读(0)
            </button>
            <button
              type="button"
              class="shelf-tab"
              data-shelf="finished"
              role="tab"
              aria-selected="false"
            >
              读完(0)
            </button>
            <button
              type="button"
              class="shelf-tab"
              data-shelf="toRead"
              role="tab"
              aria-selected="false"
            >
              想读(0)
            </button>
          </div>
        </div>

        <div class="empty-state" id="wereadEmptyState">
          <p>正在加载</p>
        </div>

        <div class="weread-shelf-host" id="wereadBookGrid"></div>
      </section>
    </main>

    <dialog class="review-dialog" id="reviewDialog" aria-labelledby="reviewDialogTitle">
      <form class="review-dialog-form" id="reviewForm" method="dialog">
        <header class="review-dialog-header">
          <div>
            <h2 class="review-dialog-title" id="reviewDialogTitle"></h2>
            <p class="review-dialog-author" id="reviewDialogAuthor"></p>
          </div>
          <button class="review-dialog-close" type="button" id="reviewDialogClose" aria-label="关闭">
            ×
          </button>
        </header>
        <div class="review-dialog-view" id="reviewDialogView" hidden>
          <time class="review-entry-date" id="reviewDialogDate"></time>
          <p class="review-entry-text" id="reviewDialogSavedText"></p>
          <div class="review-dialog-manage">
            <button type="button" class="text-button" id="reviewDialogEdit">修改</button>
            <button type="button" class="danger-button" id="reviewDialogDelete">删除</button>
          </div>
        </div>
        <div class="review-dialog-compose" id="reviewDialogCompose">
          <textarea
            class="review-dialog-text"
            id="reviewDialogText"
            rows="10"
            placeholder="写下读完这本书的感受、摘录或备忘…"
            aria-labelledby="reviewDialogTitle"
          ></textarea>
        </div>
        <p class="review-dialog-status" id="reviewDialogStatus" role="status" aria-live="polite"></p>
        <footer class="review-dialog-actions">
          <button class="secondary-button" type="button" id="reviewDialogCancel">取消</button>
          <button class="primary-button" type="submit" id="reviewDialogSave">保存</button>
        </footer>
      </form>
    </dialog>

    <dialog class="review-dialog highlights-dialog" id="highlightsDialog" aria-labelledby="highlightsDialogTitle">
      <div class="review-dialog-form highlights-dialog-form">
        <header class="review-dialog-header">
          <div>
            <h2 class="review-dialog-title" id="highlightsDialogTitle"></h2>
            <p class="review-dialog-author" id="highlightsDialogAuthor"></p>
          </div>
          <button
            class="review-dialog-close"
            type="button"
            id="highlightsDialogClose"
            aria-label="关闭"
          >
            ×
          </button>
        </header>
        <div class="highlights-dialog-list" id="highlightsDialogList"></div>
      </div>
    </dialog>

    <script type="module" src="./app.js?v=20250613-1"></script>
  </body>
</html>
