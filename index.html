<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开卷纪</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">My Library</p>
          <h1>开卷纪</h1>
          <p class="hero-text">开卷有益，故记于此</p>
        </div>
      </section>

      <section class="panel book-section weread-section" aria-labelledby="wereadCount">
        <div class="section-heading">
          <div>
            <p class="shelf-summary" id="wereadCount">共 0 本书</p>
          </div>
          <input
            id="wereadSearchInput"
            type="search"
            placeholder="搜索书名、作者或划线"
          />
        </div>

        <div class="empty-state" id="wereadEmptyState">
          <h3>还没有同步微信读书</h3>
          <p>配置 WEREAD_API_KEY 后运行同步脚本。</p>
        </div>

        <div class="weread-shelf-host" id="wereadBookGrid"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
