name: Record hourly reading

on:
  schedule:
    # 每小时整点（UTC :00）。北京时间整点 = UTC+8，11:00 北京跑完 → 记入 10:00–11:00
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Record reading delta for this hour
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        run: node scripts/record-reading-hour.mjs
