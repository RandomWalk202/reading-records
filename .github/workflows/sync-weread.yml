name: Sync WeRead

on:
  # Full sync backup if Cloudflare cron fails.
  # Beijing 08:10 / 14:10 / 21:10 (UTC 00:10 / 06:10 / 13:10)
  schedule:
    - cron: "10 0 * * *"
    - cron: "10 6 * * *"
    - cron: "10 13 * * *"
  workflow_dispatch:

concurrency:
  group: sync-weread
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync shelf, highlights, reading stats, and hourly delta
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        run: node scripts/sync-weread.mjs
