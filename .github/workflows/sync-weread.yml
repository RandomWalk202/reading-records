name: Sync WeRead

on:
  # Backup schedule if Cloudflare cron fails to dispatch.
  # Beijing 08:05 / 14:05 / 21:05 (UTC 00:05 / 06:05 / 13:05)
  schedule:
    - cron: "5 0 * * *"
    - cron: "5 6 * * *"
    - cron: "5 13 * * *"
  workflow_dispatch:

concurrency:
  group: sync-weread
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync shelf, highlights, and reading stats
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        run: node scripts/sync-weread.mjs
