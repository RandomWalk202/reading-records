name: Sync WeRead

on:
  schedule:
    # 每天北京时间 10:00（UTC 02:00）
    - cron: "0 2 * * *"
    # 每小时第 5 分钟（UTC）。避开整点高峰；记入「刚结束的那一小时」（北京时区）
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 2 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync shelf, highlights, and reading stats
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        run: node scripts/sync-weread.mjs

  record-hourly:
    if: github.event_name == 'schedule' && github.event.schedule == '5 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Record reading delta for the hour that just ended
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        run: node scripts/record-reading-hour.mjs
